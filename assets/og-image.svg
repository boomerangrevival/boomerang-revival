<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Social share / Open Graph card. 1200x630.
       Tip: export this to og-image.png for best compatibility across platforms. -->
  <defs>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.6" stop-color="#C084FC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0B0A12"/>
  <circle cx="950" cy="120" r="420" fill="url(#glow)"/>
  <circle cx="180" cy="560" r="320" fill="url(#glow)" opacity="0.7"/>
  <!-- grid -->
  <g stroke="#8B5CF6" stroke-opacity="0.07">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630"/>
  </g>
  <!-- mark -->
  <g transform="translate(96,86)">
    <path d="M0 8 L40 56 L0 56 Z" fill="url(#blade)"/>
    <path d="M72 96 L32 48 L72 48 Z" fill="url(#blade)" opacity="0.85"/>
  </g>
  <text x="206" y="150" font-family="'Space Grotesk',sans-serif" font-size="34" font-weight="700" fill="#F2F2F7" letter-spacing="0.5">Boomerang Revival</text>
  <text x="96" y="320" font-family="'Space Grotesk',sans-serif" font-size="72" font-weight="700" fill="#F2F2F7">Your past customers are</text>
  <text x="96" y="408" font-family="'Space Grotesk',sans-serif" font-size="72" font-weight="700" fill="url(#txt)">your next paycheck.</text>
  <text x="96" y="486" font-family="'Inter',sans-serif" font-size="30" fill="#A1A1AA">Database reactivation campaigns that bring lapsed customers back —</text>
  <text x="96" y="528" font-family="'Inter',sans-serif" font-size="30" fill="#A1A1AA">and you pay from the revenue we recover.</text>
</svg>
